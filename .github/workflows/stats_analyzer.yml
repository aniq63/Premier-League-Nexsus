name: Premier League Stats Analyzer

on:
  schedule:
    - cron: "0 2 */3 * *"
  workflow_dispatch:

concurrency:
  group: stats-analyzer
  cancel-in-progress: false

jobs:
  run-analyzer:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONUNBUFFERED: 1

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Setup Python
      # ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ─────────────────────────────────────────────
      # 3. Cache dependencies
      # ─────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ─────────────────────────────────────────────
      # 4. Install dependencies
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─────────────────────────────────────────────
      # 5. Run analyzer (with retry)
      # ─────────────────────────────────────────────
      - name: Run Premier League Stats Analyzer
        run: |
          echo "Starting stats analyzer..."
          for i in 1 2 3; do
            python -m src.services.premier_league_stats_analyzer && break
            echo "Retry $i failed... retrying in 10s"
            sleep 10
          done

      # ─────────────────────────────────────────────
      # 6. Failure notification
      # ─────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "Stats analyzer failed!"
